<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>HasAqua — Demo Talep Formu</title>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NNH87KB10N"></script>
  <script>window.dataLayer=window.dataLayer||[];function gtag(){dataLayer.push(arguments);}gtag('js',new Date());gtag('config','G-NNH87KB10N');</script>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root{--navy:#0a1628;--accent:#00aaff;--accent2:#00d4aa;--text:#e8eef5;--text-muted:#8aa0b8;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(0,170,255,0.15)}
    *{margin:0;padding:0;box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{background:var(--navy);color:var(--text);font-family:'Source Sans 3',sans-serif;font-weight:300;overflow-x:hidden;min-height:100vh;display:flex;flex-direction:column}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(0,100,200,0.18) 0%,transparent 70%),radial-gradient(ellipse 40% 40% at 90% 80%,rgba(0,212,170,0.08) 0%,transparent 60%);pointer-events:none;z-index:0}

    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 5%;height:72px;background:rgba(10,22,40,0.85);backdrop-filter:blur(20px);border-bottom:1px solid rgba(0,170,255,0.1)}
    .nav-logo{display:flex;align-items:center;gap:12px;text-decoration:none}
    .nav-logo img{height:42px;width:42px;object-fit:contain;border-radius:8px}
    .nav-logo-text{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.3rem;letter-spacing:0.08em;color:var(--text)}
    .nav-logo-text span{color:var(--accent)}
    .nav-back{color:var(--text-muted);text-decoration:none;font-size:0.9rem;transition:color 0.2s}
    .nav-back:hover{color:var(--accent)}

    main{position:relative;z-index:1;flex:1;display:flex;align-items:center;justify-content:center;padding:110px 20px 60px}

    .form-wrap{width:100%;max-width:520px}

    .form-badge{display:inline-flex;align-items:center;gap:8px;background:rgba(0,170,255,0.1);border:1px solid rgba(0,170,255,0.3);color:var(--accent);font-size:0.78rem;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;padding:6px 16px;border-radius:100px;margin-bottom:1.5rem}
    .form-badge::before{content:'';width:6px;height:6px;background:var(--accent2);border-radius:50%;animation:pulse 2s infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.5;transform:scale(1.3)}}

    h1{font-family:'Montserrat',sans-serif;font-weight:900;font-size:clamp(1.8rem,4vw,2.6rem);line-height:1.1;margin-bottom:0.75rem}
    h1 span{color:var(--accent)}
    .sub{color:var(--text-muted);font-size:1rem;line-height:1.65;margin-bottom:2rem}

    .card{background:var(--card-bg);border:1px solid var(--card-border);border-radius:16px;padding:32px;position:relative;overflow:hidden}
    .card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--accent),var(--accent2))}

    .field{margin-bottom:18px}
    label{display:block;font-size:0.8rem;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;color:var(--text-muted);margin-bottom:7px}
    input{width:100%;background:rgba(255,255,255,0.05);border:1px solid rgba(0,170,255,0.2);border-radius:8px;padding:12px 16px;color:var(--text);font-family:'Source Sans 3',sans-serif;font-size:1rem;font-weight:400;outline:none;transition:border-color 0.2s,box-shadow 0.2s}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(0,170,255,0.1)}
    input::placeholder{color:rgba(138,160,184,0.5)}

    .row2{display:grid;grid-template-columns:1fr 1fr;gap:14px}

    .submit-btn{width:100%;margin-top:8px;padding:14px;background:linear-gradient(135deg,var(--accent),#0077cc);color:#fff;font-family:'Montserrat',sans-serif;font-weight:700;font-size:1rem;letter-spacing:0.04em;border:none;border-radius:8px;cursor:pointer;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 4px 20px rgba(0,170,255,0.3)}
    .submit-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,170,255,0.45)}
    .submit-btn:disabled{opacity:0.6;cursor:not-allowed;transform:none}

    .privacy{text-align:center;margin-top:14px;font-size:0.78rem;color:var(--text-muted)}

    .error-msg{display:none;background:rgba(255,80,80,0.1);border:1px solid rgba(255,80,80,0.3);color:#ff8080;border-radius:8px;padding:10px 14px;font-size:0.85rem;margin-bottom:14px}
    .error-msg.show{display:block}

    footer{position:relative;z-index:1;text-align:center;padding:20px;border-top:1px solid rgba(0,170,255,0.1);color:var(--text-muted);font-size:0.82rem}
    footer a{color:var(--accent);text-decoration:none}
  </style>
</head>
<body>

<nav>
  <a class="nav-logo" href="index.html">
    <img src="images/logo.jpg" alt="HasAqua Logo"/>
    <span class="nav-logo-text">HAS<span>AQUA</span></span>
  </a>
  <a href="demo.html" class="nav-back">← Demo Sayfası</a>
</nav>

<main>
  <div class="form-wrap">
    <div class="form-badge">Ücretsiz Demo</div>
    <h1>Demo İndirmek İçin<br><span>Bilgilerinizi Girin</span></h1>
    <p class="sub">Kısa bir form doldurun, indirme linki hemen karşınıza çıksın. Spam göndermiyoruz.</p>

    <div class="card">
      <div class="error-msg" id="errMsg">Lütfen tüm alanları doldurun.</div>

      <div class="row2">
        <div class="field">
          <label>Ad</label>
          <input type="text" id="ad" placeholder="Ahmet" autocomplete="given-name"/>
        </div>
        <div class="field">
          <label>Soyad</label>
          <input type="text" id="soyad" placeholder="Yılmaz" autocomplete="family-name"/>
        </div>
      </div>
      <div class="field">
        <label>Firma</label>
        <input type="text" id="firma" placeholder="Yılmaz Su Ürünleri A.Ş." autocomplete="organization"/>
      </div>
      <div class="field">
        <label>Telefon</label>
        <input type="tel" id="telefon" placeholder="+90 555 000 00 00" autocomplete="tel"/>
      </div>
      <div class="field">
        <label>E-Posta</label>
        <input type="email" id="eposta" placeholder="ahmet@firma.com" autocomplete="email"/>
      </div>

      <button class="submit-btn" id="submitBtn" onclick="handleSubmit()">
        ⬇️ &nbsp;Demo'yu İndir
      </button>
      <p class="privacy">🔒 Bilgileriniz yalnızca HasAqua ekibiyle paylaşılır.</p>
    </div>
  </div>
</main>

<footer>
  <p>© 2026 HasAqua &nbsp;·&nbsp; <a href="index.html">Ana Sayfa</a> &nbsp;·&nbsp; <a href="demo.html">Demo</a></p>
</footer>

<script>
  const FORMSPREE_URL = 'https://formspree.io/f/meebegrk';

  async function handleSubmit() {
    const ad      = document.getElementById('ad').value.trim();
    const soyad   = document.getElementById('soyad').value.trim();
    const firma   = document.getElementById('firma').value.trim();
    const telefon = document.getElementById('telefon').value.trim();
    const eposta  = document.getElementById('eposta').value.trim();
    const err     = document.getElementById('errMsg');
    const btn     = document.getElementById('submitBtn');

    if (!ad || !soyad || !firma || !telefon || !eposta) {
      err.textContent = 'Lütfen tüm alanları doldurun.';
      err.classList.add('show');
      return;
    }
    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(eposta)) {
      err.textContent = 'Geçerli bir e-posta adresi girin.';
      err.classList.add('show');
      return;
    }
    err.classList.remove('show');
    btn.disabled = true;
    btn.textContent = '⏳  Gönderiliyor...';

    const tarih = new Date().toLocaleString('tr-TR');

    try {
      const res = await fetch(FORMSPREE_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({ ad, soyad, firma, telefon, eposta, tarih })
      });

      if (res.ok) {
        window.location.href = 'demo-tesekkur.html';
      } else {
        throw new Error('Formspree error');
      }
    } catch(e) {
      btn.disabled = false;
      btn.textContent = '⬇️  Demo\'yu İndir';
      err.textContent = 'Bir hata oluştu, lütfen tekrar deneyin.';
      err.classList.add('show');
    }
  }

  // Enter ile gönder
  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleSubmit();
  });
</script>
</body>
</html>
